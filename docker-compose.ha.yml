# Stack con PostgreSQL — per deploy multi-tenant
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
      POSTGRES_DB: nexus
    volumes:
      - nexus-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nexus:
    build: .
    ports:
      - "3847:3847"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3847
      NEXUS_LICENSE_TIER: platform
      NEXUS_DATABASE_URL: postgres://nexus:nexus_secret@postgres:5432/nexus
      NEXUS_DEFAULT_TENANT: default
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - nexus-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3847/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - nexus
    profiles: ["monitoring"]

volumes:
  nexus-pg-data:
  nexus-data:
